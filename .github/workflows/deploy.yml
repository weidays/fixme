name: Build & deploy

# Builds the static site + Functions and deploys to Cloudflare Pages.
# Fires when content or code lands on main (i.e. when you merge a review PR),
# and can be run manually.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'functions/**'
      - 'astro.config.mjs'
      - 'wrangler.toml'
      - 'content-backlog.json'
      - 'package.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=fixme-vip
